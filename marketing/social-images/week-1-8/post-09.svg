<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-labelledby="t09">
  <title id="t09">Post 09 — 417 rejections, four causes are 81 percent</title>
  <rect width="1200" height="627" fill="#f3f0ea"/>
  <rect x="0.5" y="0.5" width="1199" height="626" fill="none" stroke="#0b0f1a" stroke-opacity="0.08"/>

  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="14" fill="#0b0f1a" fill-opacity="0.55">
    <text x="60" y="60">09 / 24 — 60-day rejection audit, n=417</text>
  </g>
  <g font-family="'Instrument Serif', Georgia, serif" fill="#0b0f1a">
    <text x="60" y="118" font-size="38">Four error types. Eighty-one percent.</text>
  </g>

  <!-- horizontal bars. total bar width track = 700 -->
  <!-- 34% = 340, 22% = 220, 15% = 150, 10% = 100, 19 others sum = 19% = 190 thin -->

  <!-- row 1: GTIN 34% -->
  <g>
    <text x="60" y="200" font-family="'Instrument Serif', Georgia, serif" font-size="22" fill="#0b0f1a">GTIN malformed or missing</text>
    <rect x="60" y="215" width="680" height="34" fill="#0b0f1a" fill-opacity="0.05"/>
    <rect x="60" y="215" width="680" height="34" fill="none" stroke="#0b0f1a" stroke-opacity="0.1"/>
    <rect x="60" y="215" width="340" height="34" fill="#0b0f1a"/>
    <text x="760" y="239" font-family="'Geist Mono', ui-monospace, monospace" font-size="20" fill="#0b0f1a">34%</text>
    <text x="830" y="239" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.55">142 rejections</text>
  </g>

  <!-- row 2: Images 22% -->
  <g>
    <text x="60" y="285" font-family="'Instrument Serif', Georgia, serif" font-size="22" fill="#0b0f1a">Image below minimum resolution</text>
    <rect x="60" y="300" width="680" height="34" fill="#0b0f1a" fill-opacity="0.05"/>
    <rect x="60" y="300" width="680" height="34" fill="none" stroke="#0b0f1a" stroke-opacity="0.1"/>
    <rect x="60" y="300" width="220" height="34" fill="#0b0f1a"/>
    <text x="760" y="324" font-family="'Geist Mono', ui-monospace, monospace" font-size="20" fill="#0b0f1a">22%</text>
    <text x="830" y="324" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.55">92 rejections</text>
  </g>

  <!-- row 3: Category attribute 15% -->
  <g>
    <text x="60" y="370" font-family="'Instrument Serif', Georgia, serif" font-size="22" fill="#0b0f1a">Category attribute missing</text>
    <rect x="60" y="385" width="680" height="34" fill="#0b0f1a" fill-opacity="0.05"/>
    <rect x="60" y="385" width="680" height="34" fill="none" stroke="#0b0f1a" stroke-opacity="0.1"/>
    <rect x="60" y="385" width="150" height="34" fill="#0b0f1a"/>
    <text x="760" y="409" font-family="'Geist Mono', ui-monospace, monospace" font-size="20" fill="#0b0f1a">15%</text>
    <text x="830" y="409" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.55">63 rejections</text>
  </g>

  <!-- row 4: Banned words 10% -->
  <g>
    <text x="60" y="455" font-family="'Instrument Serif', Georgia, serif" font-size="22" fill="#0b0f1a">Banned or restricted words</text>
    <rect x="60" y="470" width="680" height="34" fill="#0b0f1a" fill-opacity="0.05"/>
    <rect x="60" y="470" width="680" height="34" fill="none" stroke="#0b0f1a" stroke-opacity="0.1"/>
    <rect x="60" y="470" width="100" height="34" fill="#0b0f1a"/>
    <text x="760" y="494" font-family="'Geist Mono', ui-monospace, monospace" font-size="20" fill="#0b0f1a">10%</text>
    <text x="830" y="494" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.55">42 rejections</text>
  </g>

  <!-- 19 other errors thin -->
  <g>
    <text x="60" y="540" font-family="'Instrument Serif', Georgia, serif" font-size="14" font-style="italic" fill="#0b0f1a" fill-opacity="0.6">19 other error types</text>
    <rect x="60" y="548" width="680" height="8" fill="#0b0f1a" fill-opacity="0.05"/>
    <rect x="60" y="548" width="680" height="8" fill="none" stroke="#0b0f1a" stroke-opacity="0.1"/>
    <rect x="60" y="548" width="190" height="8" fill="#0b0f1a" fill-opacity="0.45"/>
    <text x="760" y="557" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" fill="#0b0f1a" fill-opacity="0.55">19%</text>
    <text x="830" y="557" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.4">78 rejections</text>
  </g>

  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.45">
    <text x="60" y="600">four ingest-time checks · 339 fewer rejections</text>
    <text x="1140" y="600" text-anchor="end">Palvento</text>
  </g>
</svg>
