<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-labelledby="t01">
  <title id="t01">Post 01 — thesis: the gap between free and enterprise</title>
  <rect width="1200" height="627" fill="#f3f0ea"/>
  <rect x="0.5" y="0.5" width="1199" height="626" fill="none" stroke="#0b0f1a" stroke-opacity="0.08"/>

  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="14" fill="#0b0f1a" fill-opacity="0.55">
    <text x="60" y="72">01 / 24 — the wedge</text>
  </g>

  <!-- Left card: Free -->
  <g stroke="#0b0f1a" stroke-width="1.5" fill="none">
    <rect x="90" y="170" width="290" height="280" rx="10"/>
  </g>
  <g font-family="'Instrument Serif', Georgia, serif" fill="#0b0f1a">
    <text x="115" y="220" font-size="22" font-style="italic" fill-opacity="0.55">free</text>
    <text x="115" y="282" font-size="40">Shopify</text>
    <text x="115" y="326" font-size="40">Marketplace</text>
    <text x="115" y="370" font-size="40">Connect</text>
    <text x="115" y="420" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" fill-opacity="0.55">£0 · 3 channels</text>
  </g>

  <!-- Right card: Enterprise -->
  <g stroke="#0b0f1a" stroke-width="1.5" fill="none">
    <rect x="820" y="170" width="290" height="280" rx="10"/>
  </g>
  <g font-family="'Instrument Serif', Georgia, serif" fill="#0b0f1a">
    <text x="845" y="220" font-size="22" font-style="italic" fill-opacity="0.55">enterprise</text>
    <text x="845" y="282" font-size="40">Feedonomics</text>
    <text x="845" y="326" font-size="40">Rithum</text>
    <text x="845" y="370" font-size="40">Salsify</text>
    <text x="845" y="420" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" fill-opacity="0.55">$2,500/mo · 30-day onboarding</text>
  </g>

  <!-- Middle: the gap with arrow -->
  <g stroke="#0b0f1a" stroke-width="1.5" fill="none" stroke-dasharray="4 6">
    <rect x="420" y="170" width="360" height="280" rx="10"/>
  </g>

  <!-- Arrow pointing down into the gap -->
  <g stroke="#1d5fdb" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M600 90 L600 275"/>
    <path d="M582 252 L600 278 L618 252"/>
  </g>

  <!-- "here" label -->
  <g font-family="'Instrument Serif', Georgia, serif" fill="#1d5fdb">
    <text x="618" y="110" font-size="34" font-style="italic">here</text>
  </g>

  <!-- big gap caption -->
  <g font-family="'Instrument Serif', Georgia, serif" fill="#0b0f1a">
    <text x="600" y="370" font-size="64" text-anchor="middle" fill-opacity="0.28">the gap</text>
  </g>

  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.45">
    <text x="60" y="580">30,000 Shopify operators · £100k–£500k/mo · 3+ channels</text>
    <text x="1140" y="580" text-anchor="end">Palvento</text>
  </g>
</svg>
