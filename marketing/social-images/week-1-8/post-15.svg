<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-labelledby="t15">
  <title id="t15">Post 15 — eBay policy auto-provisioning, three dropdowns</title>
  <rect width="1200" height="627" fill="#f3f0ea"/>
  <rect x="0.5" y="0.5" width="1199" height="626" fill="none" stroke="#0b0f1a" stroke-opacity="0.08"/>

  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="14" fill="#0b0f1a" fill-opacity="0.55">
    <text x="60" y="60">15 / 24 — eBay policies · auto-provisioned</text>
  </g>
  <g font-family="'Instrument Serif', Georgia, serif" fill="#0b0f1a">
    <text x="60" y="118" font-size="38">You never see a policy ID again.</text>
  </g>

  <!-- Panel -->
  <g>
    <rect x="60" y="160" width="1080" height="360" rx="10" fill="#ffffff" stroke="#0b0f1a" stroke-width="1.5"/>
    <!-- header -->
    <rect x="60" y="160" width="1080" height="56" fill="#0b0f1a" fill-opacity="0.04"/>
    <text x="90" y="194" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" fill="#0b0f1a" fill-opacity="0.7">eBay business policies · UK marketplace</text>
    <!-- sync badge -->
    <g>
      <circle cx="980" cy="188" r="5" fill="#0e7c5a"/>
      <text x="996" y="193" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0e7c5a">re-read 2 min ago</text>
    </g>
    <line x1="60" y1="216" x2="1140" y2="216" stroke="#0b0f1a" stroke-opacity="0.1"/>
  </g>

  <!-- three dropdowns -->
  <g>
    <!-- Payment -->
    <text x="90" y="272" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.55">payment</text>
    <rect x="90" y="282" width="1020" height="52" rx="4" fill="#f3f0ea" stroke="#0b0f1a" stroke-width="1.5"/>
    <text x="110" y="316" font-family="'Instrument Serif', Georgia, serif" font-size="22" fill="#0b0f1a">auto — matched to UK</text>
    <text x="380" y="316" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.5">· PayPal + managed payments · ID 3924-UK</text>
    <!-- chevron -->
    <path d="M1080 308 L 1090 318 L 1100 308" fill="none" stroke="#0b0f1a" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Shipping -->
    <text x="90" y="352" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.55">shipping</text>
    <rect x="90" y="362" width="1020" height="52" rx="4" fill="#f3f0ea" stroke="#0b0f1a" stroke-width="1.5"/>
    <text x="110" y="396" font-family="'Instrument Serif', Georgia, serif" font-size="22" fill="#0b0f1a">auto — matched to UK</text>
    <text x="380" y="396" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.5">· Royal Mail 48 + DPD next day · ID 8821-UK</text>
    <path d="M1080 388 L 1090 398 L 1100 388" fill="none" stroke="#0b0f1a" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Returns -->
    <text x="90" y="432" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.55">returns</text>
    <rect x="90" y="442" width="1020" height="52" rx="4" fill="#f3f0ea" stroke="#0b0f1a" stroke-width="1.5"/>
    <text x="110" y="476" font-family="'Instrument Serif', Georgia, serif" font-size="22" fill="#0b0f1a">auto — matched to UK</text>
    <text x="380" y="476" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.5">· 30-day buyer-paid returns · ID 1176-UK</text>
    <path d="M1080 468 L 1090 478 L 1100 468" fill="none" stroke="#0b0f1a" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.45">
    <text x="60" y="570">read on connect · re-read on edit · one silent failure a month, gone</text>
    <text x="1140" y="570" text-anchor="end">[brand]</text>
  </g>
</svg>
