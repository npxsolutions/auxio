<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-labelledby="t22">
  <title id="t22">Post 22 — Q1 2026 calendar of schema changes, TTS Beauty v3 in February</title>
  <rect width="1200" height="627" fill="#f3f0ea"/>
