    <text x="94" y="509">schema change</text>
    <rect x="230" y="498" width="18" height="14" fill="none" stroke="#1d5fdb" stroke-width="2"/>
    <text x="256" y="509" fill="#1d5fdb">the one that breaks half the market</text>
