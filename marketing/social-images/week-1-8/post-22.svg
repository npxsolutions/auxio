    <text x="885" y="282" font-family="'Geist Mono', ui-monospace, monospace" font-size="9" fill="#0b0f1a" fill-opacity="0.65">Amazon banned</text>
    <circle cx="1021" cy="362" r="5" fill="#0b0f1a"/>
    <text x="1030" y="366" font-family="'Geist Mono', ui-monospace, monospace" font-size="9" fill="#0b0f1a" fill-opacity="0.65">TTS images</text>
