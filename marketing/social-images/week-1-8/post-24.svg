    <text x="900" y="420" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-size="26" fill="#0b0f1a">all checks passed</text>
    <text x="900" y="446" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.6">1,612 SKUs · 4 channels · 0 errors</text>

    <!-- little stat chips -->
    <g>
      <rect x="700" y="480" width="130" height="40" rx="2" fill="#f3f0ea" stroke="#0b0f1a" stroke-opacity="0.1" stroke-width="1"/>
      <text x="714" y="498" font-family="'Geist Mono', ui-monospace, monospace" font-size="10" fill="#0b0f1a" fill-opacity="0.55">GTIN</text>
      <text x="714" y="514" font-family="'Instrument Serif', Georgia, serif" font-size="18" fill="#0b0f1a">1,612 / 1,612</text>

      <rect x="840" y="480" width="130" height="40" rx="2" fill="#f3f0ea" stroke="#0b0f1a" stroke-opacity="0.1" stroke-width="1"/>
      <text x="854" y="498" font-family="'Geist Mono', ui-monospace, monospace" font-size="10" fill="#0b0f1a" fill-opacity="0.55">images</text>
      <text x="854" y="514" font-family="'Instrument Serif', Georgia, serif" font-size="18" fill="#0b0f1a">all pass</text>

      <rect x="980" y="480" width="130" height="40" rx="2" fill="#f3f0ea" stroke="#0b0f1a" stroke-opacity="0.1" stroke-width="1"/>
      <text x="994" y="498" font-family="'Geist Mono', ui-monospace, monospace" font-size="10" fill="#0b0f1a" fill-opacity="0.55">policies</text>
      <text x="994" y="514" font-family="'Instrument Serif', Georgia, serif" font-size="18" fill="#0b0f1a">auto</text>
    </g>

    <text x="900" y="200" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-size="18" font-style="italic" fill="#0b0f1a" fill-opacity="0.6">before push</text>
