      <text x="380" y="340">£34</text>
      <text x="470" y="340" fill="#7d2a1a">banned</text>
      <text x="78" y="370">PB-S-NV</text>
      <text x="190" y="370">£44</text>
      <text x="290" y="370">£46</text>
      <text x="380" y="370">£44</text>
      <text x="470" y="370">£46</text>
      <text x="78" y="400">CNDL-TV-9</text>
      <text x="190" y="400" fill="#7d2a1a">GTIN?</text>
      <text x="290" y="400">£24</text>
      <text x="380" y="400">£24</text>
      <text x="470" y="400">—</text>
      <text x="78" y="430">STATION-A5</text>
      <text x="190" y="430">£14</text>
      <text x="290" y="430">£14</text>
      <text x="380" y="430" fill="#7d2a1a">img</text>
      <text x="470" y="430">£16</text>
      <text x="78" y="460">KITCH-SPN</text>
      <text x="190" y="460">£29</text>
      <text x="290" y="460">£31</text>
      <text x="380" y="460">—</text>
      <text x="470" y="460">£32</text>
      <text x="78" y="490">SKN-LIP-4</text>
      <text x="190" y="490">£9</text>
      <text x="290" y="490">£10</text>
      <text x="380" y="490">£9</text>
      <text x="470" y="490" fill="#7d2a1a">cat?</text>
