      <circle r="58" fill="#0e7c5a" fill-opacity="0.08"/>
      <path d="M-22 2 L -6 20 L 26 -16" fill="none" stroke="#0e7c5a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
