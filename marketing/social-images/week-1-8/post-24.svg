  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.45">
    <text x="60" y="605">every feature we ship is tested against the spreadsheet first</text>
    <text x="1140" y="605" text-anchor="end">ship in 7 days · [brand]</text>
  </g>
