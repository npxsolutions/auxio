  <!-- Middle arrow -->
  <g stroke="#1d5fdb" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M590 330 L 640 330"/>
    <path d="M628 322 L 640 330 L 628 338"/>
  </g>

  <!-- RIGHT side: clean interface -->
