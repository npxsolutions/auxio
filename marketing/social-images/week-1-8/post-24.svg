    <text x="680" y="138" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.6">[brand] · pre-flight</text>
    <circle cx="1100" cy="133" r="5" fill="#0e7c5a"/>

    <!-- central all checks passed badge -->
    <g transform="translate(900, 310)">
