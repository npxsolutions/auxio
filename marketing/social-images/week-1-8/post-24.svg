      <text x="190" y="250">£22</text>
      <text x="290" y="250">£24</text>
      <text x="380" y="250">£22</text>
      <text x="470" y="250">£26</text>
      <text x="78" y="280">PB-M-NAT</text>
      <text x="190" y="280">£54</text>
      <text x="290" y="280" fill="#7d2a1a">stale</text>
      <text x="380" y="280">—</text>
      <text x="470" y="280">£52</text>
      <text x="78" y="310">KITCH-WB</text>
      <text x="190" y="310">£89</text>
      <text x="290" y="310">£92</text>
      <text x="380" y="310">—</text>
      <text x="470" y="310">£95</text>
