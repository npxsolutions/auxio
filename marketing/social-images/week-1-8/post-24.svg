      <line x1="60" y1="230" x2="570" y2="230"/>
      <line x1="60" y1="260" x2="570" y2="260"/>
      <line x1="60" y1="290" x2="570" y2="290"/>
      <line x1="60" y1="320" x2="570" y2="320"/>
      <line x1="60" y1="350" x2="570" y2="350"/>
      <line x1="60" y1="380" x2="570" y2="380"/>
      <line x1="60" y1="410" x2="570" y2="410"/>
      <line x1="60" y1="440" x2="570" y2="440"/>
      <line x1="60" y1="470" x2="570" y2="470"/>
      <line x1="60" y1="500" x2="570" y2="500"/>
