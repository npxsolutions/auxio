<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-labelledby="t19">
  <title id="t19">Post 19 — AI drafting vs AI validating</title>
  <rect width="1200" height="627" fill="#f3f0ea"/>
  <rect x="0.5" y="0.5" width="1199" height="626" fill="none" stroke="#0b0f1a" stroke-opacity="0.08"/>

  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="14" fill="#0b0f1a" fill-opacity="0.55">
    <text x="60" y="60">19 / 24 — easy vs hard</text>
  </g>

  <!-- vertical divider -->
  <line x1="600" y1="110" x2="600" y2="520" stroke="#0b0f1a" stroke-width="1.5"/>

  <!-- LEFT: AI drafting — easy -->
  <g>
    <text x="90" y="160" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" fill="#0b0f1a" fill-opacity="0.55">everybody ships this</text>
    <text x="90" y="230" font-family="'Instrument Serif', Georgia, serif" font-size="54" fill="#0b0f1a">AI drafting.</text>
    <text x="90" y="280" font-family="'Instrument Serif', Georgia, serif" font-size="32" font-style="italic" fill="#0b0f1a" fill-opacity="0.55">easy.</text>
    <!-- mock draft UI -->
    <g>
      <rect x="90" y="310" width="440" height="180" rx="6" fill="#ffffff" stroke="#0b0f1a" stroke-width="1.5"/>
      <text x="110" y="338" font-family="'Geist Mono', ui-monospace, monospace" font-size="11" fill="#0b0f1a" fill-opacity="0.55">title · Amazon US</text>
      <!-- animated-like lines of generated text -->
      <rect x="110" y="350" width="400" height="10" rx="2" fill="#0b0f1a" fill-opacity="0.8"/>
      <rect x="110" y="368" width="360" height="10" rx="2" fill="#0b0f1a" fill-opacity="0.55"/>
      <rect x="110" y="386" width="280" height="10" rx="2" fill="#0b0f1a" fill-opacity="0.3"/>
      <text x="110" y="430" font-family="'Geist Mono', ui-monospace, monospace" font-size="11" fill="#0b0f1a" fill-opacity="0.55">bullets · 5 of 5</text>
      <!-- check -->
      <circle cx="480" cy="455" r="18" fill="none" stroke="#0e7c5a" stroke-width="1.5"/>
      <path d="M472 456 L 478 464 L 490 450" fill="none" stroke="#0e7c5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="110" y="460" font-family="'Geist Mono', ui-monospace, monospace" font-size="11" fill="#0b0f1a" fill-opacity="0.55">looks fine</text>
    </g>
  </g>

  <!-- RIGHT: AI validating — hard -->
  <g>
    <text x="640" y="160" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" fill="#1d5fdb">the real engineering</text>
    <text x="640" y="230" font-family="'Instrument Serif', Georgia, serif" font-size="54" fill="#0b0f1a">AI validating.</text>
    <text x="640" y="280" font-family="'Instrument Serif', Georgia, serif" font-size="32" font-style="italic" fill="#1d5fdb">hard.</text>
    <!-- validator list -->
    <g>
      <rect x="640" y="310" width="480" height="180" rx="6" fill="#ffffff" stroke="#1d5fdb" stroke-width="2"/>
      <g font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a">
        <text x="660" y="336">· GTIN · check digit · UPC-A / EAN-13</text>
        <text x="660" y="358">· image floor · 1600 + product ratio</text>
        <text x="660" y="380">· category attribute completeness</text>
        <text x="660" y="402">· banned words · per-marketplace list</text>
        <text x="660" y="424">· policy ID · re-read on edit</text>
        <text x="660" y="446">· condition value · shipping mapping</text>
        <text x="660" y="468">· schema diff · weekly · by engineer</text>
      </g>
    </g>
  </g>

  <!-- caption across -->
  <g font-family="'Instrument Serif', Georgia, serif" font-size="26" font-style="italic" fill="#0b0f1a">
    <text x="600" y="555" text-anchor="middle">the one that matters is on the right.</text>
  </g>

  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.45">
    <text x="1140" y="600" text-anchor="end">Palvento</text>
  </g>
</svg>
