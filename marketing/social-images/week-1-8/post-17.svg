    <text x="168" y="310" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-size="52" fill="#0b0f1a">$349</text>
    <text x="168" y="332" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="11" fill="#0b0f1a" fill-opacity="0.55">per month · 5 channels</text>
