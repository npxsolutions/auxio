<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-labelledby="t17">
  <title id="t17">Post 17 — five currencies, five pricing cards, no quote form</title>
  <rect width="1200" height="627" fill="#f3f0ea"/>
  <rect x="0.5" y="0.5" width="1199" height="626" fill="none" stroke="#0b0f1a" stroke-opacity="0.08"/>

  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="14" fill="#0b0f1a" fill-opacity="0.55">
    <text x="60" y="60">17 / 24 — the price you see is the price you pay</text>
  </g>

  <!-- Currency toggle at top -->
  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="12">
    <rect x="60" y="90" width="300" height="36" rx="18" fill="#ffffff" stroke="#0b0f1a" stroke-width="1.5"/>
    <!-- chips -->
    <rect x="66" y="96" width="54" height="24" rx="12" fill="#0b0f1a"/>
    <text x="93" y="112" text-anchor="middle" fill="#f3f0ea">USD</text>
    <text x="153" y="112" text-anchor="middle" fill="#0b0f1a" fill-opacity="0.55">GBP</text>
    <text x="213" y="112" text-anchor="middle" fill="#0b0f1a" fill-opacity="0.55">EUR</text>
    <text x="273" y="112" text-anchor="middle" fill="#0b0f1a" fill-opacity="0.55">AUD</text>
    <text x="333" y="112" text-anchor="middle" fill="#0b0f1a" fill-opacity="0.55">CAD</text>
  </g>

  <!-- 5 cards side by side -->
  <!-- card width 200, gap 16, total = 200*5 + 16*4 = 1064. start x = 68 -->
  <!-- heights and content identical except currency + price -->

  <!-- Helper layout per card -->
  <!-- USD -->
  <g>
