<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-labelledby="t12">
  <title id="t12">Post 12 — pre-flight validator panel</title>
  <rect width="1200" height="627" fill="#f3f0ea"/>
  <rect x="0.5" y="0.5" width="1199" height="626" fill="none" stroke="#0b0f1a" stroke-opacity="0.08"/>

  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="14" fill="#0b0f1a" fill-opacity="0.55">
    <text x="60" y="60">12 / 24 — pre-flight check · before push</text>
  </g>
  <g font-family="'Instrument Serif', Georgia, serif" fill="#0b0f1a">
    <text x="60" y="118" font-size="38">4 channels. 4 errors. No silent pushes.</text>
  </g>

  <!-- Panel -->
  <g>
    <rect x="60" y="160" width="1080" height="400" rx="10" fill="#ffffff" stroke="#0b0f1a" stroke-width="1.5"/>
    <!-- header bar -->
    <rect x="60" y="160" width="1080" height="52" fill="#0b0f1a" fill-opacity="0.04"/>
    <g font-family="'Geist Mono', ui-monospace, monospace" font-size="13" fill="#0b0f1a" fill-opacity="0.7">
      <text x="90" y="192">pre-flight · 1,612 SKUs · 4 channels</text>
      <text x="1110" y="192" text-anchor="end" fill="#0b0f1a" fill-opacity="0.45">[brand]</text>
    </g>

    <!-- separator -->
    <line x1="60" y1="212" x2="1140" y2="212" stroke="#0b0f1a" stroke-opacity="0.1"/>
  </g>

  <!-- rows -->
  <!-- helper: row y=240 step=85 -->
  <g>
    <!-- Amazon -->
    <line x1="60" y1="300" x2="1140" y2="300" stroke="#0b0f1a" stroke-opacity="0.08"/>
    <circle cx="110" cy="258" r="14" fill="none" stroke="#0b0f1a" stroke-width="1.5"/>
    <text x="110" y="263" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="10" fill="#0b0f1a">az</text>
    <text x="145" y="252" font-family="'Instrument Serif', Georgia, serif" font-size="24" fill="#0b0f1a">Amazon US + UK</text>
    <text x="145" y="278" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.55">GTIN format · variation theme · image floor</text>
    <!-- error chip -->
    <rect x="760" y="238" width="100" height="32" rx="2" fill="#7d2a1a" fill-opacity="0.08" stroke="#7d2a1a" stroke-width="1.5"/>
    <text x="810" y="260" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="14" fill="#7d2a1a">3 errors</text>
    <!-- fix button -->
    <rect x="990" y="238" width="120" height="32" rx="2" fill="#0b0f1a"/>
    <text x="1050" y="260" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" fill="#f3f0ea">fix → </text>
  </g>

  <g>
    <!-- eBay -->
    <line x1="60" y1="385" x2="1140" y2="385" stroke="#0b0f1a" stroke-opacity="0.08"/>
    <circle cx="110" cy="343" r="14" fill="none" stroke="#0b0f1a" stroke-width="1.5"/>
    <text x="110" y="348" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="10" fill="#0b0f1a">eb</text>
    <text x="145" y="337" font-family="'Instrument Serif', Georgia, serif" font-size="24" fill="#0b0f1a">eBay UK</text>
    <text x="145" y="363" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.55">item specifics · condition ID · policy IDs</text>
    <rect x="760" y="323" width="100" height="32" rx="2" fill="#0e7c5a" fill-opacity="0.08" stroke="#0e7c5a" stroke-width="1.5"/>
    <text x="810" y="345" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="14" fill="#0e7c5a">clean</text>
    <rect x="990" y="323" width="120" height="32" rx="2" fill="none" stroke="#0b0f1a" stroke-opacity="0.2" stroke-width="1.5"/>
    <text x="1050" y="345" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" fill="#0b0f1a" fill-opacity="0.45">push →</text>
  </g>

  <g>
    <!-- TikTok -->
    <line x1="60" y1="470" x2="1140" y2="470" stroke="#0b0f1a" stroke-opacity="0.08"/>
    <circle cx="110" cy="428" r="14" fill="none" stroke="#0b0f1a" stroke-width="1.5"/>
    <text x="110" y="433" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="10" fill="#0b0f1a">tt</text>
    <text x="145" y="422" font-family="'Instrument Serif', Georgia, serif" font-size="24" fill="#0b0f1a">TikTok Shop</text>
    <text x="145" y="448" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.55">banned words · image ratio · beauty v3</text>
    <rect x="760" y="408" width="100" height="32" rx="2" fill="#7d2a1a" fill-opacity="0.08" stroke="#7d2a1a" stroke-width="1.5"/>
    <text x="810" y="430" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="14" fill="#7d2a1a">1 error</text>
    <rect x="990" y="408" width="120" height="32" rx="2" fill="#0b0f1a"/>
    <text x="1050" y="430" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" fill="#f3f0ea">fix → </text>
  </g>

  <g>
    <!-- Etsy -->
    <circle cx="110" cy="513" r="14" fill="none" stroke="#0b0f1a" stroke-width="1.5"/>
    <text x="110" y="518" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="10" fill="#0b0f1a">et</text>
    <text x="145" y="507" font-family="'Instrument Serif', Georgia, serif" font-size="24" fill="#0b0f1a">Etsy</text>
    <text x="145" y="533" font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.55">tag length · materials · shop sections</text>
    <rect x="760" y="493" width="100" height="32" rx="2" fill="#0e7c5a" fill-opacity="0.08" stroke="#0e7c5a" stroke-width="1.5"/>
    <text x="810" y="515" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="14" fill="#0e7c5a">clean</text>
    <rect x="990" y="493" width="120" height="32" rx="2" fill="none" stroke="#0b0f1a" stroke-opacity="0.2" stroke-width="1.5"/>
    <text x="1050" y="515" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" fill="#0b0f1a" fill-opacity="0.45">push →</text>
  </g>

  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="12" fill="#0b0f1a" fill-opacity="0.45">
    <text x="60" y="600">catch what the marketplace will catch · before it embarrasses you</text>
  </g>
</svg>
