  <text x="72" y="420" font-family="Geist, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="24" fill="#5a6171" letter-spacing="-0.3">$48 list price. Same catalogue row. What you actually keep after fees, per channel:</text>
