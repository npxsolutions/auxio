  <text x="72" y="440" font-family="Geist, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="22" fill="#5a6171" letter-spacing="-0.3">Across Amazon, eBay and TikTok Shop. Map one Shopify catalogue to three marketplace taxonomies correctly — it is a two-week job on a first launch, and a tax on every new product after.</text>

  
    <g>
